spring:
  application:
    name: chaindata-api

  r2dbc:
    url: ${R2DBC_URL:r2dbc:postgresql://localhost:5432/chaindata}
    username: ${R2DBC_USERNAME:chaindata}
    password: ${R2DBC_PASSWORD:chaindata}

  flyway:
    url: ${FLYWAY_URL:jdbc:postgresql://localhost:5432/chaindata}
    user: ${FLYWAY_USER:chaindata}
    password: ${FLYWAY_PASSWORD:chaindata}
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: localhost
      port: 6379

  cloud:
    stream:
      kafka:
        binder:
          brokers: localhost:9092

server:
  port: 8080

management:
  server:
    port: 8081
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.chaindata.api: INFO
    org.springframework.r2dbc: INFO
