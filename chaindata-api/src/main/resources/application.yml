spring:
  application:
    name: chaindata-api

  r2dbc:
    url: r2dbc:postgresql://localhost:5432/chaindata
    username: chaindata
    password: chaindata

  flyway:
    url: jdbc:postgresql://localhost:5432/chaindata
    user: chaindata
    password: chaindata
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: localhost
      port: 6379

  cloud:
    stream:
      kafka:
        binder:
          brokers: localhost:9092

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisReactiveAutoConfiguration
      - org.springframework.cloud.stream.config.BindingServiceConfiguration

server:
  port: 8080

management:
  server:
    port: 8081
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.chaindata.api: DEBUG
    org.springframework.r2dbc: INFO
